# .portolan/metadata.yaml — FTW Global prediction confidence & quality layers

title: "FTW Global — Prediction Confidence & Quality Layers (500 m)"

contact:
  name: "Fields of the World — Taylor Geospatial"
  email: "isaac.corley@taylorgeospatial.org"

license: "CC-BY-4.0"
license_url: "https://creativecommons.org/licenses/by/4.0/"

citation: >-
  Robinson, C., Muhawenayo, G., Khanal, S., Fang, Z., Corley, I., Tárano, A. M.,
  Estes, L., Marcus, J., Jacobs, N., Kerner, H., Becker-Reshef, I., & Lavista Ferres, J. M.
  (2026). The first global agricultural field boundary map at 10 m resolution. arXiv:2605.11055.

keywords:
  - agriculture
  - field boundaries
  - agricultural fields
  - cropland
  - confidence
  - uncertainty
  - quality
  - Sentinel-2
  - PRUE
  - Fields of the World
  - FTW
  - remote sensing
