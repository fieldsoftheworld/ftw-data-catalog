# .portolan/metadata.yaml — FTW Global field-boundary prediction vectors

title: "FTW Global — Field Boundary Predictions (alpha)"

contact:
  name: "Fields of the World — Taylor Geospatial"
  email: "isaac.corley@taylorgeospatial.org"

license: "CC-BY-4.0"
license_url: "https://creativecommons.org/licenses/by/4.0/"

citation: >-
  Robinson, C., Muhawenayo, G., Khanal, S., Fang, Z., Corley, I., Tárano, A. M.,
  Estes, L., Marcus, J., Jacobs, N., Kerner, H., Becker-Reshef, I., & Lavista Ferres, J. M.
  (2026). The first global agricultural field boundary map at 10 m resolution. arXiv:2605.11055.

keywords:
  - agriculture
  - field boundaries
  - agricultural fields
  - cropland
  - PRUE
  - confidence
  - Fields of the World
  - FTW
  - GeoParquet
  - PMTiles
  - global

attribution: "Fields of the World / PRUE (Robinson et al. 2026), CC-BY-4.0"
source_url: "https://source.coop/ftw/global-data"

processing_notes: >-
  Field-boundary polygons from the full-resolution (10 m) PRUE model, published as GeoParquet
  partitioned by country (Hive-style admin:country_code=<CC> directories); large countries are
  further split by admin subdivision. Each polygon is enriched with a derived `confidence` value
  (0–100): the modeled PRUE confidence sampled at the field's point-on-surface from the 500 m
  confidence COG (predictions/confidence collection), rescaled raw/0.578178×100 and clamped to 100
  (0.578178 = 100%, matching the FTW inference app), with no-data cells set to null. This centroid
  sample is the closest single value to the app's confidence_mean. Per-country PMTiles are built
  from the enriched parquets (duckdb → GeoJSONSeq → tippecanoe). Generated by scripts/add_confidence.py,
  process_partition.sh, run_rails.sh and make_pmtiles.py in the ftw-portolan repo
  (https://github.com/fieldsoftheworld/ftw-portolan).

known_issues: >-
  `confidence` reflects 500 m cell-level model reliability, not individual-polygon geometric
  accuracy, and is conservative where the visual signature differs from FTW training data
  (e.g. some smallholder systems). Recommended default reliability filter confidence >= 69
  (raw 0.4). The source `results-by-admin` vectors had no confidence column; it is added here.
  This is an alpha release derived from the best available per-admin results; the two other
  upstream copies (results, results-fiboa) are intentionally excluded.

examples:
  - engine: duckdb
    description: "Count confident fields for one country"
    code: |
      INSTALL spatial; LOAD spatial;
      SELECT count(*) FILTER (WHERE confidence >= 69) AS confident, count(*) AS total
      FROM read_parquet('https://data.source.coop/ftw/global-data/predictions/vectors/'
        || 'alpha/results-by-admin-conf/admin:country_code=FR/France.parquet');
  - engine: duckdb
    description: "Query the whole dataset via the country glob"
    code: |
      INSTALL spatial; LOAD spatial;
      SELECT admin:country_code, count(*) FROM read_parquet(
        'https://data.source.coop/ftw/global-data/predictions/vectors/'
        || 'alpha/results-by-admin-conf/admin:country_code=*/*.parquet')
      GROUP BY 1 ORDER BY 2 DESC;
  - engine: other
    description: "Open per-country PMTiles in a MapLibre viewer with the confidence style"
    code: |
      https://data.source.coop/ftw/global-data/predictions/vectors/styles/default.json
